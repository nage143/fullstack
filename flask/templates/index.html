<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flight Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-4">Flight Ticket Booking</h1>

      <form id="bookingForm" class="card p-4">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Origin</label>
            <input class="form-control" id="origin" placeholder="City or airport code" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Destination</label>
            <input class="form-control" id="destination" placeholder="City or airport code" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Depart Date</label>
            <input type="date" class="form-control" id="depart_date" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Return Date</label>
            <input type="date" class="form-control" id="return_date">
          </div>
          <div class="col-md-4">
            <label class="form-label">Passengers</label>
            <input type="number" class="form-control" id="passengers" value="1" min="1" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Class</label>
            <select id="class" class="form-select">
              <option>Economy</option>
              <option>Premium Economy</option>
              <option>Business</option>
              <option>First</option>
            </select>
          </div>

          <div class="col-12">
            <label class="form-label">Passenger Name(s)</label>
            <input class="form-control" id="names" placeholder="Comma-separated full names" required>
          </div>

          <div class="col-12 text-end">
            <button type="submit" class="btn btn-primary">Book Flight</button>
          </div>
        </div>
      </form>

      <div id="result" class="mt-4"></div>
    </div>

    <script src="/static/app.js"></script>
  </body>
  </html>
